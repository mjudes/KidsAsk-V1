# Docker Compose configuration for KidsAsk.ai
# Supports both production and development modes through environment variables

services:
  # Frontend service
  frontend:
    build: ./frontend
    ports:
      - "3050:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_RUNTIME_ENV=docker
      - NODE_ENV=${NODE_ENV:-production}
    command: ${FRONTEND_COMMAND:-npm start}
    depends_on:
      - api
    networks:
      - kidsask-network

  # API Gateway service
  api:
    build: ./api
    ports:
      - "4000:4000"
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      - database
      - ollama-api
    environment:
      - DB_HOST=database
      - DB_PORT=27017
      - DB_NAME=kidsaskdb
      - NODE_ENV=${NODE_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - AI_SERVICE_URL=http://ollama-api:5000
    command: ${API_COMMAND:-npm start}
    networks:
      - kidsask-network
      
  # Ollama AI Engine Service
  ollama-service:
    build:
      context: ./ollama-service
      dockerfile: Dockerfile
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - kidsask-network

  # Ollama API Service (for integration with the main API)
  ollama-api:
    build:
      context: ./ollama-service
      dockerfile: Dockerfile.api
    ports:
      - "5050:5000"
    volumes:
      - ./ollama-service/src:/app
      - ./ollama-service/config:/app/config
    depends_on:
      - ollama-service
    environment:
      - OLLAMA_HOST=ollama-service
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=tinyllama
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - PORT=5000
    networks:
      - kidsask-network

  # MongoDB Database
  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - kidsask-network

networks:
  kidsask-network:
    driver: bridge

volumes:
  mongodb_data:
  ollama_data:
